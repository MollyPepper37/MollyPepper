<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Spin Bot Advanced Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --muted: #94a3b8;
      --text: #f1f5f9;
      --accent: #06b6d4;
      --good: #22c55e;
      --warn: #eab308;
      --bad: #ef4444;
      --chip: #334155;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    h1 { margin: 0; font-size: 24px; font-weight: 600; }
    .accent { color: var(--accent); }
    .wrap { padding: 20px; max-width: 1400px; margin: 0 auto; }
    .card { 
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px; 
      overflow: hidden; 
      margin-bottom: 20px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }
    .card h2 { 
      font-size: 16px; 
      font-weight: 600;
      margin: 0; 
      padding: 16px 20px; 
      border-bottom: 1px solid var(--border); 
      background: rgba(51, 65, 85, 0.5);
      letter-spacing: 0.025em;
    }
    .section { padding: 20px; }
    .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .btn {
      background: var(--chip); 
      border: 1px solid var(--border); 
      color: var(--text);
      padding: 8px 16px; 
      border-radius: 8px; 
      cursor: pointer; 
      transition: all .15s;
      font-size: 14px;
      font-weight: 500;
    }
    .btn:hover { 
      border-color: var(--accent); 
      color: var(--accent);
      background: #3b4b62;
    }
    .btn.small { padding: 4px 8px; font-size: 12px; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn.primary:hover { background: #0891b2; }
    .btn.success { background: var(--good); border-color: var(--good); color: white; }
    .btn.warning { background: var(--warn); border-color: var(--warn); color: black; }
    .btn.danger { background: var(--bad); border-color: var(--bad); color: white; }
    .user-card {
      background: rgba(51, 65, 85, 0.3); 
      border: 1px solid var(--border); 
      border-radius: 12px; 
      padding: 16px; 
      margin-bottom: 12px;
      transition: all .15s;
    }
    .user-card:hover {
      border-color: var(--accent);
      background: rgba(51, 65, 85, 0.5);
    }
    .user-head { display: flex; gap: 16px; align-items: center; justify-content: space-between; }
    .user-head h3 { margin: 0; font-size: 16px; font-weight: 600; color: var(--accent); }
    .kv { 
      display: grid; 
      grid-template-columns: 120px 1fr 120px 1fr; 
      gap: 12px 16px; 
      margin: 12px 0; 
      font-size: 13px; 
    }
    .muted { color: var(--muted); }
    .ok { color: var(--good); }
    .bad { color: var(--bad); }
    .warn { color: var(--warn); }
    .jwt-token {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 8px;
      color: #4b5563;
      background: #111827;
      padding: 4px 8px;
      border-radius: 4px;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
      user-select: all;
    }
    .jwt-token:hover {
      color: #6b7280;
    }
    pre.logs {
      font-family: 'Monaco', 'Menlo', monospace;
      white-space: pre-wrap; 
      background: #0f172a; 
      border: 1px solid var(--border);
      padding: 16px; 
      border-radius: 12px; 
      max-height: 400px; 
      overflow: auto; 
      font-size: 12px;
      color: #a5b4cb;
      line-height: 1.5;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--panel);
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: var(--accent);
      line-height: 1.2;
    }
    .stat-label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--chip);
      border-radius: 3px;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .settings-panel {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    .input-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .input-group label {
      font-size: 13px;
      color: var(--muted);
    }
    .input-group input {
      background: var(--chip);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      width: 80px;
      font-size: 14px;
    }
    .input-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
    }
    .badge-idle { background: #475569; color: #e2e8f0; }
    .badge-refreshing { background: #eab308; color: #000; }
    .badge-claiming { background: #8b5cf6; color: #fff; }
    .badge-checking { background: #3b82f6; color: #fff; }
    .badge-spinning { background: #06b6d4; color: #000; }
    .badge-completed { background: #22c55e; color: #000; }
    .badge-error { background: #ef4444; color: #fff; }
  </style>
</head>
<body>
  <header>
    <h1>Spin Bot <span class="accent">Advanced Dashboard</span></h1>
    <div class="row">
      <button class="btn" id="refreshAll">🔄 Refresh</button>
    </div>
  </header>

  <div class="wrap">
    <!-- System Stats -->
    <div class="stats-grid" id="systemStats">
      <div class="stat-card">
        <div class="stat-value" id="totalUsers">0</div>
        <div class="stat-label">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="activeUsers">0</div>
        <div class="stat-label">Currently Processing</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="completedUsers">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="queuePosition">0</div>
        <div class="stat-label">In Queue</div>
      </div>
    </div>

    <!-- Control Panel -->
    <div class="card">
      <h2>Control Panel</h2>
      <div class="section">
        <div class="settings-panel">
          <div class="input-group">
            <label>Max Concurrent:</label>
            <input type="number" id="maxConcurrent" min="1" max="50" value="5">
          </div>
          <div class="input-group">
            <label>Spin Delay (s):</label>
            <input type="number" id="spinDelay" min="1" max="30" step="0.1" value="7">
          </div>
          <button class="btn primary" id="applySettings">Apply Settings</button>
          <button class="btn success" id="startButton">▶️ Start Processing</button>
          <button class="btn warning" id="pauseButton">⏸️ Pause</button>
          <button class="btn danger" id="resetButton">🔄 Reset All</button>
        </div>
        <div class="row" style="margin-top: 16px;">
          <span class="status-badge" id="systemStatus">System Ready</span>
        </div>
      </div>
    </div>

    <!-- Users Panel -->
    <div class="card">
      <h2>Users & Statistics</h2>
      <div class="section" id="usersPanel">
        <div class="muted">Loading users...</div>
      </div>
    </div>

    <!-- Activity Logs -->
    <div class="card">
      <h2>Activity Logs</h2>
      <div class="section">
        <div class="row" style="margin-bottom:16px;">
          <button class="btn small" id="refreshLogs">Refresh Logs</button>
          <span class="muted">Showing latest entries</span>
        </div>
        <pre class="logs" id="logsBox">Loading logs...</pre>
      </div>
    </div>
  </div>

  <script>
    // State
    let systemState = {
      isPaused: false,
      maxConcurrent: 5,
      spinDelay: 7,
      activeUsers: 0,
      completedUsers: 0,
      totalUsers: 0,
      queuePosition: 0
    };

    // API Functions
    async function fetchUsers() {
      const r = await fetch('/api/users');
      if (!r.ok) throw new Error('Failed to fetch users');
      return r.json();
    }

    async function fetchDebugLogs(limit = 100) {
      const r = await fetch(`/api/debug-logs?limit=${limit}`);
      if (!r.ok) throw new Error('Failed to fetch logs');
      return r.json();
    }

    async function fetchSystemState() {
      const r = await fetch('/api/system-state');
      if (!r.ok) throw new Error('Failed to fetch system state');
      return r.json();
    }

    async function sendCommand(endpoint, body = {}) {
      const r = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      return r.json();
    }

    // Render Functions
    function renderUsers(users) {
      const panel = document.getElementById('usersPanel');
      const userIds = Object.keys(users).sort();
      
      if (!userIds.length) {
        panel.innerHTML = '<div class="muted">No users loaded.</div>';
        return;
      }

      // Calculate totals
      const totals = {
        totalSpins: userIds.reduce((sum, id) => sum + (users[id].totalSpinsRun || 0), 0),
        totalPacks: userIds.reduce((sum, id) => sum + (users[id].totalPacksOpened || 0), 0),
        totalAchievements: userIds.reduce((sum, id) => sum + (users[id].achievementsClaimed || 0), 0)
      };

      const parts = [`
        <div class="stats-grid" style="margin-bottom:20px;">
          <div class="stat-card">
            <div class="stat-value">${totals.totalSpins}</div>
            <div class="stat-label">Total Spins</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${totals.totalPacks}</div>
            <div class="stat-label">Total Packs</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${totals.totalAchievements}</div>
            <div class="stat-label">Achievements</div>
          </div>
        </div>
      `];

      userIds.forEach((id) => {
        const u = users[id];
        const statusClass = `badge-${u.status || 'idle'}`;
        const progressPercent = u.maxSpinsThisRound ? (u.spinsCompletedThisRound / u.maxSpinsThisRound * 100) : 0;
        
        parts.push(`
          <div class="user-card">
            <div class="user-head">
              <div style="display:flex; align-items:center; gap:12px;">
                <h3>${id}</h3>
                <span class="status-badge ${statusClass}">${u.status || 'idle'}</span>
              </div>
              <div class="row">
                <button class="btn small" data-act="refresh" data-id="${id}">Refresh Token</button>
                <button class="btn small" data-act="process" data-id="${id}">Process Now</button>
              </div>
            </div>
            
            <!-- Tiny JWT token (barely readable, just for copying) -->
            <div class="jwt-token" onclick="navigator.clipboard.writeText('${u.jwtToken || ''}')" title="Click to copy">
              ${u.jwtToken || 'No token'}
            </div>
            
            <div class="kv">
              <span class="muted">Status</span>
              <span>${u.isProcessing ? '🔄 Processing' : (u.isActive ? '✅ Active' : '❌ Inactive')}</span>
              <span class="muted">Funds</span>
              <span class="${u.lastFunds < 10000 ? 'warn' : 'ok'}">${(u.lastFunds || 0).toLocaleString()}</span>
              
              <span class="muted">Spins (Total/Round)</span>
              <span>${u.totalSpinsRun || 0} / ${u.spinsCompletedThisRound || 0} of ${u.maxSpinsThisRound || 0}</span>
              <span class="muted">Packs Opened</span>
              <span>${u.totalPacksOpened || 0}</span>
              
              <span class="muted">Achievements</span>
              <span>${u.achievementsClaimed || 0}</span>
              <span class="muted">Last Error</span>
              <span class="${u.lastError ? 'bad' : 'muted'}">${u.lastError || 'None'}</span>
            </div>
            
            ${u.maxSpinsThisRound ? `
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${progressPercent}%"></div>
            </div>
            ` : ''}
            
            ${u.startTime ? `
            <div style="margin-top:8px; font-size:11px; color:var(--muted);">
              Started: ${new Date(u.startTime).toLocaleTimeString()}
              ${u.endTime ? ` · Completed: ${new Date(u.endTime).toLocaleTimeString()}` : ''}
            </div>
            ` : ''}
          </div>
        `);
      });

      panel.innerHTML = parts.join('\n');
      
      // Add event listeners
      panel.querySelectorAll('button[data-act]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          const act = e.currentTarget.getAttribute('data-act');
          
          try {
            if (act === 'refresh') {
              await sendCommand(`/api/user/${id}/refresh`);
            } else if (act === 'process') {
              await sendCommand(`/api/user/${id}/process`);
            }
            await loadAll();
          } catch (err) {
            alert(err.message);
          }
        });
      });
    }

    function renderLogs(logs) {
      const box = document.getElementById('logsBox');
      if (!logs || !logs.length) {
        box.textContent = 'No logs yet.';
        return;
      }
      
      const lines = logs.map(entry => {
        const time = entry.timestamp ? new Date(entry.timestamp).toLocaleTimeString() : '';
        return `[${time}] [${entry.userId}] ${entry.message}`;
      });
      
      box.textContent = lines.join('\n');
      box.scrollTop = 0; // Scroll to top to see latest
    }

    function updateSystemStats(state) {
      document.getElementById('totalUsers').textContent = state.totalUsers || 0;
      document.getElementById('activeUsers').textContent = state.activeUsers || 0;
      document.getElementById('completedUsers').textContent = state.completedUsers || 0;
      document.getElementById('queuePosition').textContent = state.queuePosition || 0;
      
      const systemStatus = document.getElementById('systemStatus');
      systemStatus.textContent = state.isPaused ? '⏸️ PAUSED' : '▶️ RUNNING';
      systemStatus.className = `status-badge ${state.isPaused ? 'badge-warning' : 'badge-spinning'}`;
      
      document.getElementById('maxConcurrent').value = state.maxConcurrent;
      document.getElementById('spinDelay').value = state.spinDelay;
    }

    // Load Functions
    async function loadAll() {
      try {
        const [users, logs, state] = await Promise.all([
          fetchUsers(),
          fetchDebugLogs(100),
          fetchSystemState()
        ]);
        
        systemState = state;
        updateSystemStats(state);
        renderUsers(users);
        renderLogs(logs);
      } catch (err) {
        console.error('Failed to load:', err);
      }
    }

    // Event Listeners
    document.getElementById('refreshAll').addEventListener('click', loadAll);
    document.getElementById('refreshLogs').addEventListener('click', async () => {
      const logs = await fetchDebugLogs(100);
      renderLogs(logs);
    });

    document.getElementById('applySettings').addEventListener('click', async () => {
      const maxConcurrent = document.getElementById('maxConcurrent').value;
      const spinDelay = document.getElementById('spinDelay').value;
      
      await sendCommand('/api/settings', { maxConcurrent, spinDelay });
      await loadAll();
    });

    document.getElementById('startButton').addEventListener('click', async () => {
      await sendCommand('/api/start');
      await loadAll();
    });

    document.getElementById('pauseButton').addEventListener('click', async () => {
      await sendCommand('/api/pause');
      await loadAll();
    });

    document.getElementById('resetButton').addEventListener('click', async () => {
      if (confirm('Are you sure you want to reset all user stats?')) {
        await sendCommand('/api/reset');
        await loadAll();
      }
    });

    // Auto-refresh every 5 seconds
    setInterval(loadAll, 5000);

    // Initial load
    loadAll();
  </script>
</body>
</html>
